<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Clip Wall — OBS Overlay</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:transparent; width:1920px; height:1080px; overflow:hidden; font-family:'Segoe UI',sans-serif; }

  #video-a, #video-b {
    position:fixed; inset:0; width:100%; height:100%;
    object-fit:contain; background:#000;
    opacity:0; transition:opacity 0.5s ease;
  }
  #video-a.active, #video-b.active { opacity:1; }

  #progress {
    position:fixed; bottom:0; left:0;
    height:4px; width:0%; z-index:10;
    border-radius:0 2px 2px 0;
  }

  #watermark {
    position:fixed; bottom:18px; left:20px;
    display:flex; align-items:center; gap:10px;
    z-index:10; opacity:0; transition:opacity 0.5s ease;
  }
  #watermark.show { opacity:1; }
  #watermark-avatar { width:32px; height:32px; border-radius:50%; border:2px solid rgba(255,255,255,0.3); object-fit:cover; }
  #watermark-label { font-size:10px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:rgba(255,255,255,0.5); }
  #watermark-name { font-size:15px; font-weight:700; color:#fff; letter-spacing:0.5px; text-shadow:0 1px 6px rgba(0,0,0,0.8); }

  #loader { position:fixed; inset:0; background:#000; display:flex; align-items:center; justify-content:center; z-index:20; transition:opacity 0.5s; }
  #loader.hidden { opacity:0; pointer-events:none; }
  .loader-dot { width:8px; height:8px; border-radius:50%; background:rgba(255,255,255,0.3); animation:dotPulse 1.2s ease infinite; margin:0 4px; }
  .loader-dot:nth-child(2) { animation-delay:0.2s; }
  .loader-dot:nth-child(3) { animation-delay:0.4s; }
  @keyframes dotPulse { 0%,80%,100%{transform:scale(0.7);opacity:0.3} 40%{transform:scale(1);opacity:1} }

  #error { position:fixed; inset:0; background:#000; display:none; align-items:center; justify-content:center; flex-direction:column; gap:12px; color:rgba(255,255,255,0.4); font-size:13px; z-index:20; text-align:center; padding:40px; }
  #error.show { display:flex; }
</style>
</head>
<body>

<div id="loader">
  <div class="loader-dot"></div>
  <div class="loader-dot"></div>
  <div class="loader-dot"></div>
</div>

<div id="error">
  <div style="font-size:28px">⚠️</div>
  <div id="error-msg">Could not load clips.</div>
</div>

<video id="video-a" autoplay playsinline></video>
<video id="video-b" autoplay playsinline></video>

<div id="progress"></div>
<div id="watermark">
  <img id="watermark-avatar" src="" alt="" />
  <div>
    <div id="watermark-label">Now Playing</div>
    <div id="watermark-name"></div>
  </div>
</div>

<script>
  const params    = new URLSearchParams(location.search);
  const TOKEN     = params.get('token')     || '';
  const CLIENT_ID = params.get('client_id') || '';
  const CHANNEL   = params.get('channel')   || '';
  const DURATION  = parseInt(params.get('duration') || '30') * 1000;
  const ACCENT    = '#' + (params.get('accent')  || 'a855f7');
  const ACCENT2   = '#' + (params.get('accent2') || 'ec4899');

  const bar = document.getElementById('progress');
  bar.style.background = `linear-gradient(90deg,${ACCENT},${ACCENT2})`;
  bar.style.boxShadow  = `0 0 8px ${ACCENT}`;

  let clips = [], currentIdx = 0, progressTimer = null;
  let activeSlot = 'a';
  const vidA = document.getElementById('video-a');
  const vidB = document.getElementById('video-b');

  function showError(msg) {
    document.getElementById('loader').classList.add('hidden');
    document.getElementById('error-msg').innerHTML = msg;
    document.getElementById('error').classList.add('show');
  }

  // ── GET MP4 VIA GQL (Twitch's own internal API) ──
  async function getClipMp4(clipId) {
    try {
      const res = await fetch('https://gql.twitch.tv/gql', {
        method: 'POST',
        headers: {
          'Client-Id': 'kimne78kx3ncx6brgo4mv6wki5h1ko',
          'Content-Type': 'application/json',
          // Pass the user's OAuth token so Twitch treats this as an authenticated request
          'Authorization': `OAuth ${TOKEN}`
        },
        body: JSON.stringify({
          operationName: 'VideoAccessToken_Clip',
          variables: { slug: clipId },
          extensions: {
            persistedQuery: {
              version: 1,
              sha256Hash: '36b89d2507fce29e5ca551df756d27c1cfe079e2609642b4390aa4c35796eb11'
            }
          }
        })
      });

      const json = await res.json();
      const clip  = json?.data?.clip;
      if (!clip) return null;

      const token     = clip.playbackAccessToken;
      const qualities = clip.videoQualities;
      if (!qualities?.length || !token) return null;

      // Build signed MP4 URL — highest quality first
      const src = qualities[0].sourceURL;
      const sig  = encodeURIComponent(token.signature);
      const tok  = encodeURIComponent(token.value);
      return `${src}?sig=${sig}&token=${tok}`;
    } catch(e) {
      return null;
    }
  }

  async function init() {
    if (!TOKEN || !CLIENT_ID || !CHANNEL) {
      showError('Missing URL parameters.<br>Regenerate the OBS URL from the setup page.');
      return;
    }

    const headers = { 'Authorization': `Bearer ${TOKEN}`, 'Client-Id': CLIENT_ID };

    try {
      const userRes  = await fetch(`https://api.twitch.tv/helix/users?login=${CHANNEL}`, { headers });
      const userData = await userRes.json();
      const user     = userData.data?.[0];
      if (!user) throw new Error('Channel not found');

      document.getElementById('watermark-avatar').src = user.profile_image_url || '';
      document.getElementById('watermark-name').textContent = user.display_name || CHANNEL;

      const ago30 = new Date(Date.now() - 30*24*60*60*1000).toISOString();
      const [topRes, recentRes] = await Promise.all([
        fetch(`https://api.twitch.tv/helix/clips?broadcaster_id=${user.id}&first=50`, { headers }),
        fetch(`https://api.twitch.tv/helix/clips?broadcaster_id=${user.id}&first=50&started_at=${ago30}`, { headers })
      ]);

      const all  = [...(await topRes.json()).data||[], ...(await recentRes.json()).data||[]];
      const seen = new Set();
      clips = shuffle(all.filter(c => { if(seen.has(c.id)) return false; seen.add(c.id); return true; }));

      if (!clips.length) throw new Error('No clips found for ' + CHANNEL);

      // Pre-fetch first clip's MP4 URL before starting
      clips[0].mp4 = await getClipMp4(clips[0].id);
      if (!clips[0].mp4) throw new Error(
        'Could not get clip video URL.<br><br>' +
        'Please log out on the setup page, log back in,<br>then regenerate your OBS URL.'
      );

      document.getElementById('loader').classList.add('hidden');
      playClip(0);

      // Prefetch next few in background
      for (let i = 1; i < Math.min(clips.length, 5); i++) {
        getClipMp4(clips[i].id).then(url => { clips[i].mp4 = url; });
      }

    } catch(e) {
      showError(e.message || String(e));
    }
  }

  function shuffle(arr) {
    const a = [...arr];
    for (let i=a.length-1; i>0; i--) { const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
    return a;
  }

  function getNextIdx(current) {
    if (clips.length === 1) return 0;
    let next;
    do { next = Math.floor(Math.random() * clips.length); }
    while (next === current);
    return next;
  }

  async function playClip(idx) {
    currentIdx = idx;
    const clip = clips[idx];

    if (!clip.mp4) clip.mp4 = await getClipMp4(clip.id);

    if (!clip.mp4) {
      // Skip and try next
      clips.splice(idx, 1);
      if (!clips.length) { showError('All clips failed to load.'); return; }
      playClip(getNextIdx(Math.max(0, idx-1)));
      return;
    }

    const nextVid = activeSlot === 'a' ? vidB : vidA;
    const prevVid = activeSlot === 'a' ? vidA : vidB;

    nextVid.src    = clip.mp4;
    nextVid.muted  = true;  // start muted so OBS allows autoplay
    nextVid.volume = 1;

    nextVid.oncanplay = () => {
      nextVid.play().then(() => {
        // Unmute immediately after play starts — works because playback is already running
        nextVid.muted = false;
      }).catch(() => {
        // If still blocked, stay muted but keep playing
        nextVid.muted = true;
      });
      nextVid.classList.add('active');
      prevVid.classList.remove('active');
      activeSlot = activeSlot === 'a' ? 'b' : 'a';
      document.getElementById('watermark').classList.add('show');
      clearProgress();
      startProgress();

      // Prefetch next
      const ni = getNextIdx(idx);
      if (!clips[ni].mp4) getClipMp4(clips[ni].id).then(url => { clips[ni].mp4 = url; });
    };

    nextVid.onerror = () => {
      clips.splice(idx, 1);
      if (!clips.length) { showError('All clips failed to load.'); return; }
      playClip(getNextIdx(Math.max(0, idx-1)));
    };
  }

  function nextClip() {
    clearProgress();
    document.getElementById('watermark').classList.remove('show');
    playClip(getNextIdx(currentIdx));
  }

  function startProgress() {
    bar.style.transition = 'none'; bar.style.width = '0%';
    const start = performance.now();
    const tick  = now => {
      const pct = Math.min((now-start)/DURATION*100, 100);
      bar.style.width = pct + '%';
      if (pct < 100) progressTimer = requestAnimationFrame(tick);
      else nextClip();
    };
    progressTimer = requestAnimationFrame(tick);
  }

  function clearProgress() {
    if (progressTimer) cancelAnimationFrame(progressTimer);
    bar.style.width = '0%';
  }

  init();
</script>
</body>
</html>
